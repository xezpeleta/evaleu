name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Optionally rebuild site/data.json from latest summary
        shell: bash
        run: |
          set -euo pipefail
          SUMMARY_PATH="eval/official_multiseed_allbench_weekend/summary.json"
          if [[ -f "$SUMMARY_PATH" ]]; then
            python3 site/build_site_data.py
            echo "Rebuilt site/data.json from $SUMMARY_PATH"
          else
            echo "No $SUMMARY_PATH in repository. Deploying committed site/ as-is."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
